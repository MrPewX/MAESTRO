<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MAESTRO Aggregator</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
        }

        .login-card {
            background: white;
            padding: 48px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #475569; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        #error-msg {
            color: #ef4444;
            background: #fef2f2;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 32px;">
            <div class="logo">Maestro<span>.</span></div>
            <h2 style="margin-top: 10px;">Masuk ke Portal</h2>
            <p style="color: var(--text-muted); font-size: 14px;">Gunakan kredensial tim Anda.</p>
        </div>

        <div id="error-msg">Username atau Password salah!</div>

        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="cth: direkturutama" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Masuk Sekarang</button>
        </form>

        <div style="margin-top: 24px; text-align: center; font-size: 13px; color: var(--text-muted);">
            Belum punya akun? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Daftar Sekarang</a><br><br>
            Lupa akses? Hubungi <span style="color: var(--primary);">Manajer IT</span>
        </div>
    </div>

    <script>
        const validUsers = {
            'direkturutama': { pass: '123', role: 'direktur', label: 'Direktur Utama' },
            'manajersertifikasi': { pass: '123', role: 'sertifikasi', label: 'Manajer Sertifikasi' },
            'manajermutu': { pass: '123', role: 'mutu', label: 'Manajer Mutu' },
            'manajerkeuangan': { pass: '123', role: 'keuangan', label: 'Manajer Administrasi & Keuangan' },
            'manajerit': { pass: '123', role: 'it', label: 'Manajer IT & Komunikasi' },
            'asesi': { pass: '123', role: 'asesi', label: 'Asesi (Budi Santoso)' }
        };

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            const error = document.getElementById('error-msg');

            // 1. CEK DULU DI DATA LOKAL (UNTUK TIM INTERNAL)
            const userData = validUsers[user];
            if (userData && userData.pass === pass) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', userData.role);
                localStorage.setItem('roleLabel', userData.label);
                localStorage.setItem('username', user);
                window.location.href = userData.role === 'asesi' ? 'dashboard.html' : 'lsp-dashboard.html';
                return;
            }

            // 2. JIKA TIDAK ADA, CEK KE DATABASE GOOGLE (UNTUK ASESI DAFTAR)
            btn.innerText = 'Memverifikasi...';
            const dbResult = await loginFromDB(user, pass);

            if (dbResult && dbResult.status === 'success') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', dbResult.role);
                localStorage.setItem('roleLabel', dbResult.label);
                localStorage.setItem('username', user);
                window.location.href = dbResult.role === 'asesi' ? 'dashboard.html' : 'lsp-dashboard.html';
            } else {
                error.style.display = 'block';
                btn.innerText = 'Masuk Sekarang';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
